services:
  # Backend API
  - type: web
    name: intro-ai-backend
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # Set in Render Dashboard
      - key: GEMINI_API_KEY
        sync: false # Set in Render Dashboard
      - key: JWT_SECRET
        sync: false # Set in Render Dashboard
      - key: EMAIL_USER
        sync: false # Set in Render Dashboard
      - key: EMAIL_PASS
        sync: false # Set in Render Dashboard

  # Frontend Static Site
  - type: static
    name: intro-ai-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: intro-ai-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
